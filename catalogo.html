<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catálogo Virtual</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>✨ Catálogo Exclusivo</h1>
  <p>Victoria’s Secret & Perfumes Árabes</p>
</header>

<main>
  <section class="produtos">

    <div class="produto">
      <img src="img/body-splash.jpg" alt="Body Splash VS">
      <h3>Body Splash Victoria’s Secret</h3>
      <p class="preco">R$ 145,00</p>

      <div class="quantidade">
        <button onclick="alterarQtd(0, -1)">−</button>
        <span id="qtd-0">1</span>
        <button onclick="alterarQtd(0, 1)">+</button>
      </div>

      <button class="add" onclick="addCarrinho(0, 'Body Splash VS', 145)">
        Adicionar
      </button>
    </div>

    <div class="produto">
      <img src="img/perfume-arabe.jpg" alt="Perfume Árabe">
      <h3>Perfume Árabe Lattafa</h3>
      <p class="preco">R$ 270,00</p>

      <div class="quantidade">
        <button onclick="alterarQtd(1, -1)">−</button>
        <span id="qtd-1">1</span>
        <button onclick="alterarQtd(1, 1)">+</button>
      </div>

      <button class="add" onclick="addCarrinho(1, 'Perfume Árabe Lattafa', 270)">
        Adicionar
      </button>
    </div>

  </section>

  <section class="carrinho">
    <h2>🛒 Seu carrinho</h2>
    <ul id="listaCarrinho"></ul>
    <p id="total"></p>

    <textarea id="obs" placeholder="Observações (presente, horário, bairro...)"></textarea>

    <button class="finalizar" onclick="finalizarPedido()">
      Finalizar no WhatsApp
    </button>
  </section>
</main>

<footer>
  🛵 Motoboy aos sábados (Jaguariúna) • 📦 Correios para todo Brasil
</footer>

<script src="script.js"></script>
</body>
</html>
